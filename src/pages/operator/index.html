<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraeGo — Panel de Operadores</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="/src/pages/operator/operator.css">
</head>
<body>

    <!-- PANTALLA: LOGIN -->
    <main id="screen-login">
        <div class="login-card">
            <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem;">
                <img src="/src/assets/icon_traego.svg" alt="TraeGo Icon" style="width: 32px;">
                <img src="/src/assets/logo_traego.svg" alt="TraeGo Logo" style="height: 18px;">
            </div>
            <h1>Panel de Operadores</h1>
            <p>Ingresa tu código para gestionar pedidos.</p>
            
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="operatorCode">Código de Operador</label>
                    <input type="text" id="operatorCode" placeholder="OP-XXXXX" required maxlength="8" autocomplete="off" spellcheck="false">
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">Ingresar al Panel</button>
                <div id="loginError" class="hidden" style="color: #ef4444; font-size: 0.85rem; margin-top: 1rem; font-weight: 600;"></div>
            </form>
        </div>
    </main>

    <!-- PANTALLA: DASHBOARD PRINCIPAL -->
    <div id="screen-main" class="hidden">
        <!-- Sidebar Izquierdo -->
        <aside class="sidebar">
          <div class="sidebar-brand">
            <img src="/src/assets/icon_traego.svg" alt="TraeGo">
            <img src="/src/assets/logo_traego.svg" alt="TraeGo">
          </div>

          <div class="sidebar-section">
            <span class="sidebar-section-label">Negocio</span>
            <div class="biz-info">
              <div class="biz-logo" id="sidebarBizLogo">
                <i class="ri-store-2-line"></i>
              </div>
              <div>
                <div class="biz-name" id="sidebarBizName">Cargando...</div>
              </div>
            </div>
          </div>

          <div class="sidebar-section">
            <span class="sidebar-section-label">Operador activo</span>
            <div class="op-name" id="sidebarOpName">---</div>
            <div class="op-role">Operador</div>
          </div>

          <div class="sidebar-section">
            <span class="sidebar-section-label">Permisos activos</span>
            <div class="perm-list" id="sidebarPerms"></div>
          </div>

          <div class="sidebar-footer">
            <button class="btn-logout" id="logoutBtn">
              <i class="ri-logout-box-r-line"></i> Cerrar Sesión
            </button>
          </div>
        </aside>

        <!-- Área de Contenido Principal -->
        <main class="main-area">
          <header class="main-header">
            <h2>Pedidos activos</h2>
            <span class="order-counter"><span id="orderCount">0</span> pedidos en total</span>
          </header>
          <section class="content">
            <div class="content-card">
              <div class="orders-grid" id="ordersGrid"></div>
            </div>
          </section>
        </main>
    </div>

    <!-- Assign Order Modal -->
    <div id="opAssignModal" class="op-modal-overlay hidden">
      <div class="op-modal">
        <div class="op-modal-header">
          <h3>Despachar pedido <span id="opAssignOrderRef"></span></h3>
          <button class="op-modal-close" onclick="const m=document.getElementById('opAssignModal');m.classList.add('hidden');m.style.display='none'">&times;</button>
        </div>
        <div class="op-modal-body">
          <p style="color:var(--text-muted);margin-bottom:1rem;font-size:0.9rem;">
            Selecciona el domiciliario para este pedido:
          </p>
          <div id="opAssignList"></div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/src/pages/operator/operator.js"></script>
</body>
</html>
