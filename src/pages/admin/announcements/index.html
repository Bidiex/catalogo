<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Anuncios - Superadmin</title>
    <link rel="icon" type="image/svg+xml" href="/src/assets/icon_traego.svg" />
    <link rel="stylesheet" href="/src/styles/global.css">
    <link rel="stylesheet" href="/src/pages/admin/dashboard/admin-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <h1 class="logo">
                <img src="/src/assets/logo_traego.svg" alt="TraeGo Logo" style="height: 40px;">
                <span class="sr-only">SuperAdmin</span>
            </h1>

            <nav class="admin-nav">
                <a href="/admin/dashboard" class="admin-nav-item">
                    <i class="fa-solid fa-chart-line"></i>
                    Dashboard
                </a>
                <a href="/admin/users" class="admin-nav-item">
                    <i class="fa-solid fa-users"></i>
                    Usuarios y Negocios
                </a>
                <a href="/admin/businesses" class="admin-nav-item">
                    <i class="fa-solid fa-store"></i>
                    Negocios
                </a>
                <a href="/admin/announcements" class="admin-nav-item active">
                    <i class="fa-solid fa-bullhorn"></i>
                    Anuncios
                </a>
                <a href="/admin/support" class="admin-nav-item">
                    <i class="fa-solid fa-headset"></i>
                    Soporte
                </a>
            </nav>

            <div class="admin-user">
                <p id="adminEmail">Cargando...</p>
                <button id="logoutBtn" class="logout-btn-admin">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <div>
                    <h2>Gestión de Anuncios</h2>
                    <p style="font-size: 0.875rem; color: var(--text-secondary);" id="totalResults">Cargando...</p>
                </div>
                <button id="btnNewAnn" class="btn-primary">
                    <i class="fa-solid fa-plus"></i>
                    <span>Nuevo Anuncio</span>
                </button>
            </header>

            <!-- Filters -->
            <div class="admin-filters">
                <div class="search-container">
                    <i class="fa-solid fa-search search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Buscar anuncio...">
                </div>

                <div class="filter-chips">
                    <button class="filter-chip active" data-filter="all">
                        Todos <span class="filter-count" id="count-all">0</span>
                    </button>
                    <button class="filter-chip" data-filter="active">
                        Activos <span class="filter-count" id="count-active">0</span>
                    </button>
                    <button class="filter-chip" data-filter="inactive">
                        Inactivos <span class="filter-count" id="count-inactive">0</span>
                    </button>
                </div>
            </div>

            <!-- Grid Container -->
            <div id="announcementsContainer" class="announcements-grid">
                <!-- Cards will be injected here -->
            </div>
            
            <!-- Modal para Crear/Editar -->
            <div class="modal-overlay" id="announcementModal">
                <div class="modal">
                    <div class="modal-header">
                        <h3 id="modalTitle">Nuevo Anuncio</h3>
                        <button class="close-modal-btn" id="btnCloseModal">
                            <i class="fa-solid fa-times"></i>
                        </button>
                    </div>
                    <div class="modal-body">
                        <form id="announcementForm">
                            <input type="hidden" id="annId">
                            
                            <div class="form-group">
                                <label class="form-label">Título</label>
                                <input type="text" id="annTitle" class="form-input" required>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Descripción (solo admin)</label>
                                <textarea id="annDesc" class="form-textarea" rows="2"></textarea>
                            </div>

                            <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group">
                                    <label class="form-label">Tipo</label>
                                    <select id="annType" class="form-select" required>
                                        <option value="promo">Promoción</option>
                                        <option value="novedad">Novedad</option>
                                        <option value="feature">Nueva Función</option>
                                        <option value="aviso">Aviso</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Plan Destino</label>
                                    <select id="annTargetPlan" class="form-select" required>
                                        <option value="all">Todos los planes</option>
                                        <option value="free">Solo Free</option>
                                        <option value="plus">Solo Plus</option>
                                        <option value="pro">Solo Pro</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group">
                                    <label class="form-label">Fecha Caducidad (opcional)</label>
                                    <input type="date" id="annExpiresAt" class="form-input">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Mostrar como Modal Automático</label>
                                    <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;">
                                        <label class="switch">
                                            <input type="checkbox" id="annShowModal">
                                            <span class="slider"></span>
                                        </label>
                                        <span style="font-size: 0.875rem;">Modal / Campanilla</span>
                                    </div>
                                    <p id="modalLimitWarning" style="color: #dc2626; font-size: 0.75rem; margin-top: 0.25rem; display: none;">
                                        <i class="fa-solid fa-triangle-exclamation"></i> Ya tienes 3 anuncios activos con modal. Desactiva uno primero.
                                    </p>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Imagen (Proporción 1:1)</label>
                                <input type="file" id="annImageFile" class="form-input" accept="image/jpeg, image/png, image/webp">
                                <p style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem;">Se recomienda imagen cuadrada (1:1) para mejor visualización.</p>
                                <div class="image-preview-container" id="annImagePreviewContainer" style="display: none; margin-top: 0.5rem;">
                                    <img id="annImagePreview" src="" alt="Preview">
                                </div>
                                <input type="hidden" id="annImageUrl">
                            </div>

                            <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; border-top: 1px solid var(--border-color); padding-top: 1rem; margin-top: 1rem;">
                                <div class="form-group">
                                    <label class="form-label">Tipo de Acción (CTA)</label>
                                    <select id="annCtaType" class="form-select">
                                        <option value="none">Ninguno</option>
                                        <option value="link">Enlace (URL)</option>
                                        <option value="whatsapp">WhatsApp</option>
                                        <option value="phone">Teléfono</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Texto del CTA</label>
                                    <input type="text" id="annCtaText" class="form-input" placeholder="Ej. Ver más">
                                </div>
                            </div>
                            
                            <!-- Contenedores dinámicos para CTA -->
                            <div class="form-group" id="groupUrl" style="display: none;">
                                <label class="form-label">URL Destino</label>
                                <input type="url" id="annUrl" class="form-input" placeholder="https://...">
                            </div>
                            <div class="form-group" id="groupPhone" style="display: none;">
                                <label class="form-label">Teléfono (solo números)</label>
                                <input type="text" id="annPhone" class="form-input">
                            </div>
                            <div class="form-group" id="groupWhatsapp" style="display: none;">
                                <label class="form-label">Número WhatsApp</label>
                                <input type="text" id="annWhatsapp" class="form-input">
                            </div>
                            <div class="form-group" id="groupWhatsappMsg" style="display: none;">
                                <label class="form-label">Mensaje WhatsApp (opcional)</label>
                                <input type="text" id="annWhatsappMsg" class="form-input" placeholder="Ej. Quiero más info sobre {nombre_negocio}">
                            </div>

                            <div class="form-group" style="margin-top: 1rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                                <div style="display: flex; align-items: center; gap: 0.5rem;">
                                    <label class="switch">
                                        <input type="checkbox" id="annIsActive" checked>
                                        <span class="slider"></span>
                                    </label>
                                    <label class="form-label" style="margin: 0;">Anuncio Activo</label>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-secondary" id="btnCancelAnn">Cancelar</button>
                        <button type="submit" form="announcementForm" class="btn-primary" id="btnSubmitAnn">Guardar Anuncio</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="/src/pages/admin/announcements/announcements.js"></script>
</body>

</html>
