<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .dashboard-container {
            display: flex;
            width: 1000px;
            outline: 2px solid red;
            height: 100vh;
        }

        .dashboard-sidebar {
            width: 280px;
            background: #eee;
            flex-shrink: 0;
        }

        .dashboard-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            outline: 2px solid blue;
        }

        .dashboard-main {
            max-width: 1400px;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        #section-products {
            display: block;
        }

        .card {
            padding: 24px;
            display: block;
            outline: 2px solid green;
        }

        /* The tabs header */
        .products-tabs-header {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 24px;
            outline: 2px solid purple;
        }

        .products-tabs-scroll {
            flex: 1;
            min-width: 0;
            display: flex;
            overflow-x: auto;
            gap: 16px;
        }

        .products-tab-btn {
            white-space: nowrap;
            padding: 10px 20px;
            background: #ddd;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="dashboard-sidebar">Sidebar</div>
        <div class="dashboard-content">
            <main class="dashboard-main">
                <div id="section-products">
                    <section class="card">
                        <div class="products-tabs-header">
                            <button>&lt;</button>
                            <div class="products-tabs-scroll">
                                <button class="products-tab-btn">Tab 1 very long text</button>
                                <button class="products-tab-btn">Tab 2 very long text</button>
                                <button class="products-tab-btn">Tab 3 very long text</button>
                                <button class="products-tab-btn">Tab 4 very long text</button>
                                <button class="products-tab-btn">Tab 5 very long text</button>
                                <button class="products-tab-btn">Tab 6 very long text</button>
                            </div>
                            <button>&gt;</button>
                        </div>
                        <div>Some other content</div>
                    </section>
                </div>
            </main>
        </div>
    </div>
</body>

</html>
